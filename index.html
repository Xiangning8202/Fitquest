<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile-first viewport: viewport-fit=cover lets content fill behind iPhone notch -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

    <!-- PWA / App chrome -->
    <meta name="theme-color" content="#030712" />
    <meta name="application-name" content="FitQuest" />
    <meta name="description" content="游戏化运动激励 App — AI 任务 · Boss 战 · 小队陪伴" />

    <!-- iOS standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="FitQuest" />
    <!-- black-translucent lets app paint under the status bar; we handle the inset via CSS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="mask-icon" href="/icon.svg" color="#9333ea" />

    <!-- Nunito: display numerals + headings -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet" />
    <title>FitQuest — 运动冒险</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
